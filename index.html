<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CollinsVerse Technologies — Weekly Project Log. Simple, executive document-style delivery tracker.">
  <title>CollinsVerse Technologies — Weekly Project Log</title>
  
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class', // Enable class-based dark mode
      theme: {
        extend: {
          colors: {
            slateText: '#0f172a',
          }
        }
      }
    }
  </script>
  
  <!-- Custom CSS with base typography overrides -->
  <link rel="stylesheet" href="styles.css">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-full flex flex-col antialiased transition-colors duration-200 bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100">

  <!-- Sticky Executive Header -->
  <header class="sticky top-0 z-50 bg-white/95 dark:bg-slate-950/90 border-b-2 border-slate-200 dark:border-slate-800 backdrop-blur-md px-6 py-5">
    <div class="max-w-4xl mx-auto flex items-center justify-between gap-4">
      
      <!-- Brand & Project Titles -->
      <div>
        <div class="flex items-center gap-2">
          <h1 class="font-extrabold text-2xl tracking-tight text-slate-900 dark:text-white uppercase">CollinsVerse</h1>
          <span class="text-xs font-bold bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-600 dark:text-slate-300 px-2 py-0.5 rounded uppercase tracking-wider">Technologies</span>
        </div>
        <p class="text-lg font-bold text-slate-900 dark:text-slate-200 mt-1">Weekly Project Log</p>
        <p class="text-sm text-slate-500 dark:text-slate-400 font-semibold mt-0.5">Secure Mobility & Escort Ecosystem — Phase 1: Architecture</p>
      </div>

      <!-- Theme Switcher in the corner -->
      <button id="theme-toggle-btn" onclick="toggleTheme()" class="p-2.5 rounded-xl border-2 border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-900 text-slate-800 dark:text-slate-200 transition" title="Toggle Light/Dark Theme">
        <i id="theme-icon" data-lucide="moon" class="w-5 h-5"></i>
      </button>

    </div>
  </header>

  <!-- Main Executive Document Container -->
  <main class="flex-grow max-w-4xl w-full mx-auto px-6 py-10 space-y-8">
    
    <!-- Week Selector Navigation -->
    <section class="border-b-2 border-slate-200 dark:border-slate-800 pb-4">
      <span class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest block mb-3">Audit Week Selector</span>
      <div class="flex flex-wrap gap-2" id="weeks-tab-container">
        <!-- Javascript will inject clean tabs here -->
      </div>
    </section>

    <!-- Active Weekly Sprint Report Container (Bulleted Logs & Sign-Offs) -->
    <section id="weekly-sprint-container" class="space-y-8">
      <!-- Injected dynamically via app.js -->
    </section>

  </main>

  <!-- Clean Corporate Footer -->
  <footer class="border-t-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 py-6 px-6 text-center text-xs text-slate-500 dark:text-slate-500 transition-colors">
    <div class="max-w-4xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
      <p>&copy; 2026 CollinsVerse Technologies Inc. Weekly Project Log Portal.</p>
      <div class="flex items-center gap-4">
        <a href="#" class="hover:underline transition">Governance Protocol</a>
        <span>|</span>
        <a href="#" class="hover:underline transition">Data Verification</a>
      </div>
    </div>
  </footer>

  <!-- Script logic link -->
  <script src="app.js"></script>
</body>
</html>
